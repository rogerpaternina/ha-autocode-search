name: Code Quality

on:
  push:
  pull_request:

jobs:

  lint:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy

      - name: Ruff
        run: |
          ruff check .

      - name: Black
        run: |
          black --check .

      - name: Mypy
        run: |
          mypy custom_components/autocode_search --ignore-missing-imports