name: Feature Request
description: Suggest an improvement for a future release
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests are tracked on the [roadmap](../docs/roadmap.md).
        Check there before submitting a duplicate.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: scope
    attributes:
      label: Scope acknowledgment
      options:
        - label: I understand v1.0 focuses on stability and may defer new features
          required: true
