start_search:
  name: Start search
  description: Start a search and send the first infrared code from the provider or supplied list.
  fields:
    entity_id:
      name: Remote entity
      description: Entity ID of the remote that will transmit the codes.
      required: true
      selector:
        entity:
          domain: remote
    codes:
      name: Infrared codes
      description: Optional ordered list of infrared codes to test. When omitted, the configured provider is used.
      example: ["JgBQAAAB"]
      selector:
        object:
    manufacturer:
      name: Manufacturer
      description: Optional manufacturer filter applied by the code provider.
      selector:
        text:
    model:
      name: Model
      description: Optional model filter applied by the code provider.
      selector:
        text:
    device_type:
      name: Device type
      description: Optional device type filter and session metadata.
      selector:
        text:
    brand:
      name: Brand
      description: Optional brand recorded in the search session.
      selector:
        text:
    command:
      name: Command
      description: Optional command filter and session metadata.
      selector:
        text:

next_code:
  name: Next code
  description: Send the next infrared code in the active search.

previous_code:
  name: Previous code
  description: Send the previous infrared code in the active search.

finish_search:
  name: Finish search
  description: Finish the active infrared-code search.

pause:
  name: Pause search
  description: Pause the active infrared-code search without losing progress.

resume:
  name: Resume search
  description: Resume a paused infrared-code search.

cancel:
  name: Cancel search
  description: Cancel the active infrared-code search immediately.

mark_success:
  name: Mark success
  description: Record a successful infrared code so future searches can prioritize it.
  fields:
    provider:
      name: Provider
      description: Provider that supplied the successful code.
      required: true
      selector:
        text:
    payload:
      name: Payload
      description: Infrared payload that worked successfully.
      required: true
      selector:
        text:
    protocol:
      name: Protocol
      description: Optional infrared protocol for the successful code.
      selector:
        text:
    manufacturer:
      name: Manufacturer
      description: Optional manufacturer associated with the successful code.
      selector:
        text:
    model:
      name: Model
      description: Optional model associated with the successful code.
      selector:
        text:
    device_type:
      name: Device type
      description: Optional device type associated with the successful code.
      selector:
        text:
    command:
      name: Command
      description: Optional command associated with the successful code.
      selector:
        text:

clear_success_memory:
  name: Clear success memory
  description: Remove every remembered successful infrared code from memory and storage.
